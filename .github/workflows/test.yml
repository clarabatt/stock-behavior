name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: stock
          POSTGRES_PASSWORD: stock
          POSTGRES_DB: stock_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://stock:stock@localhost:5434/stock_test
      DATABASE_URL: postgresql://stock:stock@localhost:5434/stock_test
      SECRET_KEY: test-secret-key
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      DEV_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --tb=short -q
